repos:
  - repo: local
    hooks:
      - id: graphify
        name: Graphify Knowledge Graph
        entry: python scripts/run_graphify.py
        language: system
        files: '(raw/|scripts/run_graphify\.py)'
        description: "自動重新生成知識圖譜（僅在 raw/ 或 scripts/run_graphify.py 變更時執行）"
        stages: [pre-commit]
        always_run: false
